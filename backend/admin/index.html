<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FenixUz Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0f0d;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* --- Login --- */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: #111a15;
            border: 1px solid #1e3a2a;
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-card h1 {
            font-size: 24px;
            color: #10b981;
            margin-bottom: 8px;
        }

        .login-card p {
            color: #6b7280;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: #0a0f0d;
            border: 1px solid #1e3a2a;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #10b981;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #1e3a2a;
            color: #9ca3af;
        }

        .btn-outline:hover {
            border-color: #10b981;
            color: #10b981;
        }

        .btn-danger {
            background: #dc2626;
            color: #fff;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .login-error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }

        /* --- Dashboard --- */
        .dashboard {
            display: none;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: #111a15;
            border-bottom: 1px solid #1e3a2a;
        }

        .header h1 {
            font-size: 20px;
            color: #10b981;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 24px 32px;
        }

        .stat-card {
            background: #111a15;
            border: 1px solid #1e3a2a;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: 700;
            color: #10b981;
        }

        .stat-card .label {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }

        .stat-card.new .number {
            color: #f59e0b;
        }

        .stat-card.replied .number {
            color: #3b82f6;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 8px;
            padding: 0 32px 16px;
        }

        .filter-btn {
            padding: 8px 20px;
            border: 1px solid #1e3a2a;
            border-radius: 20px;
            background: transparent;
            color: #9ca3af;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: #10b981;
            color: #fff;
            border-color: #10b981;
        }

        /* Table */
        .table-wrap {
            padding: 0 32px 32px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #111a15;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1e3a2a;
        }

        th {
            text-align: left;
            padding: 14px 16px;
            font-size: 12px;
            text-transform: uppercase;
            color: #6b7280;
            background: #0d1511;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 16px;
            font-size: 14px;
            border-top: 1px solid #1e3a2a;
        }

        tr:hover td {
            background: #0d1a14;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-new {
            background: #422006;
            color: #f59e0b;
        }

        .status-read {
            background: #0c1e3a;
            color: #3b82f6;
        }

        .status-replied {
            background: #052e16;
            color: #10b981;
        }

        .msg-preview {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .actions {
            display: flex;
            gap: 6px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #111a15;
            border: 1px solid #1e3a2a;
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 32px;
        }

        .modal h2 {
            color: #10b981;
            margin-bottom: 24px;
            font-size: 20px;
        }

        .modal .field {
            margin-bottom: 16px;
        }

        .modal .field-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .modal .field-value {
            font-size: 15px;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .modal textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px 16px;
            background: #0a0f0d;
            border: 1px solid #1e3a2a;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            outline: none;
        }

        .modal textarea:focus {
            border-color: #10b981;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .header {
                padding: 16px;
            }

            .stats-row,
            .filters,
            .table-wrap {
                padding-left: 16px;
                padding-right: 16px;
            }

            .msg-preview {
                max-width: 150px;
            }
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h1>🔥 FenixUz Admin</h1>
            <p>Панель управления обращениями</p>
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="loginInput" placeholder="admin">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="passwordInput" placeholder="••••••">
            </div>
            <button class="btn btn-primary" onclick="doLogin()">Войти</button>
            <div class="login-error" id="loginError">Неверный логин или пароль</div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <div class="header">
            <h1>🔥 FenixUz Admin</h1>
            <div class="header-right">
                <button class="btn btn-sm btn-outline" onclick="loadData()">↻ Обновить</button>
                <button class="btn btn-sm btn-outline" onclick="doLogout()">Выйти</button>
            </div>
        </div>

        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="number" id="statTotal">0</div>
                <div class="label">Всего</div>
            </div>
            <div class="stat-card new">
                <div class="number" id="statNew">0</div>
                <div class="label">Новые</div>
            </div>
            <div class="stat-card">
                <div class="number" id="statRead">0</div>
                <div class="label">Прочитано</div>
            </div>
            <div class="stat-card replied">
                <div class="number" id="statReplied">0</div>
                <div class="label">Отвечено</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="">Все</button>
            <button class="filter-btn" data-filter="new">Новые</button>
            <button class="filter-btn" data-filter="read">Прочитано</button>
            <button class="filter-btn" data-filter="replied">Отвечено</button>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Имя</th>
                        <th>Email</th>
                        <th>Сообщение</th>
                        <th>Статус</th>
                        <th>Дата</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="contactsBody"></tbody>
            </table>
            <div class="empty-state" id="emptyState" style="display:none">
                <div class="icon">📭</div>
                <p>Нет обращений</p>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        let creds = { login: '', password: '' };
        let currentFilter = '';

        const API = window.location.origin;

        function authParams() {
            return `login=${encodeURIComponent(creds.login)}&password=${encodeURIComponent(creds.password)}`;
        }

        async function doLogin() {
            creds.login = document.getElementById('loginInput').value;
            creds.password = document.getElementById('passwordInput').value;

            try {
                const res = await fetch(`${API}/api/admin/stats?${authParams()}`);
                if (!res.ok) throw new Error();
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
            } catch {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function doLogout() {
            creds = { login: '', password: '' };
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        async function loadData() {
            await loadStats();
            await loadContacts();
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API}/api/admin/stats?${authParams()}`);
                const data = await res.json();
                document.getElementById('statTotal').textContent = data.total;
                document.getElementById('statNew').textContent = data.new;
                document.getElementById('statRead').textContent = data.read;
                document.getElementById('statReplied').textContent = data.replied;
            } catch { }
        }

        async function loadContacts() {
            try {
                let url = `${API}/api/admin/contacts?${authParams()}`;
                if (currentFilter) url += `&status=${currentFilter}`;
                const res = await fetch(url);
                const data = await res.json();
                renderTable(data);
            } catch { }
        }

        function renderTable(contacts) {
            const tbody = document.getElementById('contactsBody');
            const empty = document.getElementById('emptyState');

            if (!contacts.length) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            tbody.innerHTML = contacts.map(c => `
        <tr>
          <td>${c.id}</td>
          <td>${esc(c.name)}</td>
          <td>${esc(c.email)}</td>
          <td class="msg-preview">${esc(c.message)}</td>
          <td><span class="status status-${c.status}">${statusLabel(c.status)}</span></td>
          <td>${formatDate(c.created_at)}</td>
          <td class="actions">
            <button class="btn btn-sm btn-outline" onclick="openContact(${c.id})">👁</button>
            <button class="btn btn-sm btn-danger" onclick="deleteContact(${c.id})">✕</button>
          </td>
        </tr>
      `).join('');
        }

        function statusLabel(s) {
            return { new: 'Новое', read: 'Прочитано', replied: 'Отвечено' }[s] || s;
        }

        function formatDate(d) {
            return new Date(d).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        async function openContact(id) {
            try {
                const res = await fetch(`${API}/api/admin/contacts/${id}?${authParams()}`);
                const c = await res.json();

                // Отметить как прочитанное
                if (c.status === 'new') {
                    await fetch(`${API}/api/admin/contacts/${id}/read?${authParams()}`, { method: 'POST' });
                    loadData();
                }

                document.getElementById('modalContent').innerHTML = `
          <h2>Обращение #${c.id}</h2>
          <div class="field"><div class="field-label">Имя</div><div class="field-value">${esc(c.name)}</div></div>
          <div class="field"><div class="field-label">Email</div><div class="field-value">${esc(c.email)}</div></div>
          <div class="field"><div class="field-label">Дата</div><div class="field-value">${formatDate(c.created_at)}</div></div>
          <div class="field"><div class="field-label">Сообщение</div><div class="field-value">${esc(c.message)}</div></div>
          <div class="field">
            <div class="field-label">Ответ администратора</div>
            <textarea id="replyText" placeholder="Напишите ответ...">${c.admin_reply || ''}</textarea>
          </div>
          <div class="modal-actions">
            <button class="btn btn-sm btn-outline" onclick="closeModal()">Закрыть</button>
            <button class="btn btn-sm btn-primary" onclick="sendReply(${c.id})">💾 Сохранить ответ</button>
          </div>
        `;
                document.getElementById('modal').classList.add('active');
            } catch { }
        }

        async function sendReply(id) {
            const reply = document.getElementById('replyText').value.trim();
            if (!reply) return;

            await fetch(`${API}/api/admin/contacts/${id}/reply?${authParams()}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reply })
            });

            closeModal();
            loadData();
        }

        async function deleteContact(id) {
            if (!confirm('Удалить обращение?')) return;
            await fetch(`${API}/api/admin/contacts/${id}?${authParams()}`, { method: 'DELETE' });
            loadData();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Фильтры
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                loadContacts();
            });
        });

        // Закрытие модалки по клику на overlay
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        // Enter для логина
        document.getElementById('passwordInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>

</html>
